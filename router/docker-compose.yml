#
# Router-only stack. Copy router/.env.example to router/.env, and point MONGODB_URI
# to the same MongoDB used by backend services.
#
services:
  mongo:
    image: mongo:7.0
    restart: unless-stopped
    command: ["mongod", "--port", "27019", "--bind_ip_all"]
    env_file:
      - .env
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-wc_root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-replace-with-a-strong-password}
    ports:
      - "${MONGODB_HOST_PORT:-27019}:27019"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "--port",
          "27019",
          "--quiet",
          "--eval",
          "db.adminCommand({ ping: 1 })",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  router:
    build:
      context: .
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    env_file:
      - .env
    environment:
      ROUTER_PORT: ${ROUTER_PORT}
      WILDCARD_BASE_DOMAIN: ${WILDCARD_BASE_DOMAIN:-example.com}
      MONGODB_URI: ${MONGODB_URI:-mongodb://${MONGO_INITDB_ROOT_USERNAME:-wc_root}:${MONGO_INITDB_ROOT_PASSWORD:-replace-with-a-strong-password}@mongo:27019/?authSource=admin}
      MONGODB_DATABASE: ${MONGODB_DATABASE:-routegate}
      FRONTEND_ROUTE_SUBDOMAIN: ${FRONTEND_ROUTE_SUBDOMAIN:-routegate}
      FRONTEND_ROUTE_DESTINATION: ${FRONTEND_ROUTE_DESTINATION:-http://frontend:3000}
    ports:
      - "${ROUTER_PORT}:${ROUTER_PORT}"

volumes:
  mongo-data:
